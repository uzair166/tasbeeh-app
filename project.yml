name: Tasbeeh
options:
  bundleIdPrefix: com.alliance
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26"

targets:
  Tasbeeh:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tasbeeh
        excludes:
          - "Info.plist"
          - "Tasbeeh.entitlements"
    info:
      path: Tasbeeh/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - audio
        CFBundleDisplayName: Tasbeeh
        CFBundleName: Tasbeeh
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    entitlements:
      path: Tasbeeh/Tasbeeh.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.alliance.tasbeeh
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.alliance.tasbeeh
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.alliance.tasbeeh
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alliance.tasbeeh
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: Tasbeeh/Tasbeeh.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: MediaPlayer.framework
      - sdk: AVFoundation.framework
      - sdk: AudioToolbox.framework
      - target: TasbeehWidgetExtension
        embed: true

  TasbeehWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TasbeehWidget
        excludes:
          - "Info.plist"
          - "TasbeehWidget.entitlements"
    info:
      path: TasbeehWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TasbeehWidget/TasbeehWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.alliance.tasbeeh
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alliance.tasbeeh.widget
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: TasbeehWidget/TasbeehWidget.entitlements
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  TasbeehTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TasbeehTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alliance.tasbeeh.tests
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: ""
      GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Tasbeeh
