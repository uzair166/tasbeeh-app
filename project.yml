name: Tasbeeh
options:
  bundleIdPrefix: com.uzairishaq
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26"

targets:
  Tasbeeh:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tasbeeh
        excludes:
          - "Info.plist"
          - "Tasbeeh.entitlements"
    info:
      path: Tasbeeh/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - audio
        CFBundleDisplayName: Tasbeeh
        CFBundleName: Tasbeeh
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alliance.tasbeeh
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      DEVELOPMENT_TEAM: "PZPMCYS4CF"
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: MediaPlayer.framework
      - sdk: AVFoundation.framework
      - sdk: AudioToolbox.framework
      - target: TasbeehWidgetExtension
        embed: true

  TasbeehWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TasbeehWidget
        excludes:
          - "Info.plist"
          - "TasbeehWidget.entitlements"
    info:
      path: TasbeehWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alliance.tasbeeh.widget
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      DEVELOPMENT_TEAM: "PZPMCYS4CF"
      CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  TasbeehTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TasbeehTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alliance.tasbeeh.tests
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: "PZPMCYS4CF"
      GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Tasbeeh
